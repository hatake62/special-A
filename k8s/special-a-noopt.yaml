apiVersion: v1
kind: Pod
metadata:
  name: special-a-noopt
  labels:
    app: special-a-noopt
spec:
  restartPolicy: Never
  containers:
    - name: benchmark
      image: special-a-power:latest
      imagePullPolicy: IfNotPresent
      command: ["python"]
      args:
        - bench/run_case.py
        - constant_fold_array
        - --repeat
        - "100"
      resources:
        requests:
          cpu: 500m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 256Mi
